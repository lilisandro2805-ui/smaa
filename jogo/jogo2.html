<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pedra Papel Tesoura</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:Arial,Helvetica,sans-serif;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:
linear-gradient(135deg,#08142c,#2563eb);

}

.quiz{

background:white;

padding:40px;

border-radius:20px;

width:90%;
max-width:600px;

text-align:center;

box-shadow:0 20px 50px rgba(0,0,0,.4);

}

h1{

color:#2563eb;

margin-bottom:30px;

}

button{

width:100%;

padding:18px;

margin:10px 0;

border:none;

border-radius:12px;

font-size:20px;

cursor:pointer;

transition:.3s;

background:#eef4ff;

}

button:hover{

background:#2563eb;

color:white;

transform:translateY(-5px);

}

#resultado{

margin-top:25px;

font-size:22px;

font-weight:bold;

}

#novo{

display:none;

margin-top:30px;

background:#22c55e;

color:white;

}

</style>

</head>

<body>

<div class="quiz">

<h1>✊ Pedra, Papel ou Tesoura</h1>

<button onclick="jogar('Pedra')">✊ Pedra</button>

<button onclick="jogar('Papel')">✋ Papel</button>

<button onclick="jogar('Tesoura')">✌ Tesoura</button>

<p id="resultado"></p>

<button id="novo" onclick="location.href='jogo3.html'">

Jogar outro jogo

</button>

</div>

<script>

function jogar(jogador){

const escolhas=["Pedra","Papel","Tesoura"];

const computador=escolhas[Math.floor(Math.random()*3)];

let texto="";

if(jogador===computador){

texto="😐 Empate! Eu escolhi "+computador;

}

else if(

(jogador==="Pedra" && computador==="Tesoura") ||

(jogador==="Papel" && computador==="Pedra") ||

(jogador==="Tesoura" && computador==="Papel")

){

texto="🎉 Parabéns! Eu escolhi "+computador;

}

else{

texto="😅 Você perdeu! Eu escolhi "+computador;

}

document.getElementById("resultado").innerHTML=texto;

document.getElementById("novo").style.display="block";

}

</script>

</body>

</html>
