<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>S.M.A - Será que Você Sabe?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.65)),
    url("n.avif");

    background-size:cover;
    background-position:center;

}

section{

    width:90%;
    max-width:600px;

    background:white;

    padding:40px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,.5);

}

h1{

    color:#2563eb;

    margin-bottom:25px;

}

p{

    color:#334155;

    font-size:22px;

    line-height:1.6;

    margin-bottom:30px;

}

input[type="number"]{

    width:100%;

    padding:16px;

    border-radius:12px;

    border:1px solid #cbd5e1;

    font-size:20px;

}

input[type="number"]:focus{

    outline:none;

    border-color:#2563eb;

}

button{

    width:100%;

    margin-top:20px;

    padding:16px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#1d4ed8;

    transform:translateY(-4px);

}

#resultado{

    margin-top:25px;

    font-size:22px;

    font-weight:bold;

}

#proximo{

    display:none;

    background:#22c55e;

}

#proximo:hover{

    background:#16a34a;

}

</style>

</head>

<body>

<section>

<h1>🧠 SERÁ QUE VOCÊ SABE?</h1>

<p>

Se uma pessoa percorre <strong>5 km por hora</strong>,
quantos quilómetros ela percorrerá em
<strong>16 horas</strong>?

</p>

<input
type="number"
id="resposta"
placeholder="Digite a resposta">

<button onclick="verificar()">

Enviar resposta

</button>

<div id="resultado"></div>

<a href="img.html">

<button id="proximo">

Jogar outro jogo

</button>

</a>

</section>

<script>

function verificar(){

let resposta=document.getElementById("resposta").value;

let resultado=document.getElementById("resultado");

if(resposta==80){

resultado.innerHTML="✅ Parabéns! Você acertou.";

resultado.style.color="green";

}else{

resultado.innerHTML="❌ Você errou. A resposta correta é <strong>80 km</strong>.";

resultado.style.color="red";

}

document.getElementById("proximo").style.display="block";

}

</script>

</body>
</html>
