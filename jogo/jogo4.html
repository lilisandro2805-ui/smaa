<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Será que Sabes?</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Poppins,Arial,sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:
    linear-gradient(rgba(5,8,22,.75),rgba(5,8,22,.75)),
    url("uma-pintura-digital-de-um-lago-com-montanhas-e-as-palavras-por-do-sol_872754-2153.avif");

    background-size:cover;

    background-position:center;

}

.card{

    width:90%;
    max-width:600px;

    background:white;

    padding:40px;

    border-radius:25px;

    text-align:center;

    box-shadow:0 25px 60px rgba(0,0,0,.4);

}

h1{

    color:#2563eb;

    margin-bottom:30px;

}

p{

    font-size:20px;

    color:#334155;

    margin-bottom:25px;

}

input[type=number]{

    width:100%;

    padding:16px;

    border-radius:12px;

    border:1px solid #cbd5e1;

    font-size:18px;

    margin-bottom:20px;

}

input[type=number]:focus{

    outline:none;

    border-color:#2563eb;

}

button{

    width:100%;

    padding:16px;

    border:none;

    border-radius:12px;

    background:#2563eb;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    transform:translateY(-4px);

    background:#1d4ed8;

}

#resultado{

    margin-top:25px;

    font-size:22px;

    font-weight:bold;

}

#proximo{

    display:none;

    margin-top:25px;

}

</style>

</head>

<body>

<div class="card">

<h1>🧠 Será que Sabes?</h1>

<p>Uma pessoa nascida em <strong>2008</strong> tem quantos anos em <strong>2025</strong>?</p>

<input type="number" id="idade" placeholder="Escreve a resposta">

<button onclick="verificar()">

Enviar resposta

</button>

<div id="resultado"></div>

<a href="jogo5.html">

<button id="proximo">

Jogar outro jogo

</button>

</a>

</div>

<script>

function verificar(){

const idade=document.getElementById("idade").value;

const resultado=document.getElementById("resultado");

if(idade==17){

resultado.innerHTML="✅ Parabéns! Você acertou.";

resultado.style.color="#16a34a";

}else{

resultado.innerHTML="❌ Resposta errada. A resposta correta é 17 anos.";

resultado.style.color="#dc2626";

}

document.getElementById("proximo").style.display="block";

}

</script>

</body>
</html>
