<!DOCTYPE html>
<html lang="pt">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Angola</title>

<link rel="stylesheet" href="jogo.css">

</head>

<body>

<div class="quiz">

<h1>🇦🇴 Qual é a opção correta?</h1>

<button class="opcao" onclick="responder(false,this)">
Angola foi colonizada pela Espanha
</button>

<button class="opcao" onclick="responder(true,this)">
Angola foi colonizada por Portugal
</button>

<button class="opcao" onclick="responder(false,this)">
Angola foi colonizada pela Inglaterra
</button>

<a href="jogo2.html">

<button id="proximo">

Jogar outro jogo

</button>

</a>

</div>

<script>

function responder(correta,botao){

const opcoes=document.querySelectorAll(".opcao");

opcoes.forEach(op=>{

op.disabled=true;

});

if(correta){

botao.classList.add("certa");

alert("👏 Parabéns! Resposta correta.");

}else{

botao.classList.add("errada");

opcoes[1].classList.add("certa");

alert("🤣 Resposta errada.");

}

document.getElementById("proximo").style.display="block";

}

</script>

</body>

</html>
