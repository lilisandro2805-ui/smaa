<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo 3</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    background:url("uma-pintura-digital-de-um-lago-com-montanhas-e-as-palavras-por-do-sol_872754-2153.avif") center/cover;
}

.container{

    width:90%;
    max-width:600px;

    background:rgba(255,255,255,.9);

    padding:40px;

    border-radius:20px;

    text-align:center;

    box-shadow:0 20px 50px rgba(0,0,0,.4);

}

h1{

    color:#2563eb;

    margin-bottom:30px;

}

button{

    width:100%;

    padding:18px;

    margin:10px 0;

    border:none;

    border-radius:12px;

    font-size:20px;

    cursor:pointer;

    background:#eef4ff;

    transition:.3s;

}

button:hover{

    background:#2563eb;

    color:white;

    transform:translateY(-5px);

}

#novo{

    display:none;

    margin-top:20px;

    background:#22c55e;

    color:white;

}

</style>

</head>
<body>

<div class="container">

<h1>🤖 Eu escolhi TESOURA</h1>

<button onclick="jogar('Tesoura')">✂️ Tesoura</button>

<button onclick="jogar('Pedra')">🪨 Pedra</button>

<button onclick="jogar('Papel')">📄 Papel</button>

<h2 id="resultado"></h2>

<a href="jogo4.html">
<button id="novo">
Jogar outro jogo
</button>
</a>

</div>

<script>

function jogar(escolha){

let texto="";

if(escolha=="Tesoura"){

texto="😐 Empate!";

}
else if(escolha=="Pedra"){

texto="🎉 Você ganhou!";

}
else{

texto="😂 Você perdeu!";

}

document.getElementById("resultado").innerHTML=texto;

document.getElementById("novo").style.display="block";

}

</script>

</body>
</html>
