  /* =====================================
   RESET

*{
    margin:0;
    padding:0;

body{

    font-family:'Poppins',sans-serif;

    background:#050816;

    color:white;

    overflow-x:hidden;

/* =====================================
        HEADER
===================================== */

/* Header escondido ao rolar */

header{
    transition: transform .4s ease;
}

header.hide{
    transform: translateY(-100%);
}
header{

    width:100%;

    height:90px;

    padding:0 7%;


    display:flex;

    align-items:center;

    justify-content:space-between;


    background:#ffffff;


    position:sticky;

    top:0;

    z-index:100;


    box-shadow:

    0 10px 30px rgba(0,0,0,.3);

}



.logo img{

    width:160px;

}




nav ul{

    display:flex;

    gap:30px;

    list-style:none;

}



nav a{

    text-decoration:none;

    color:#0f172a;

    font-weight:600;

    transition:.3s;

}



nav a:hover,
nav .active{

    color:#2563eb;

}





.btn{

    background:#2563eb;

    color:white;

    text-decoration:none;


    padding:13px 30px;


    border-radius:40px;


    font-weight:600;


    transition:.3s;


}



.btn:hover{

    background:#1d4ed8;

    transform:translateY(-4px);


    box-shadow:

    0 10px 30px rgba(37,99,235,.5);

}





/* =====================================
        HERO
===================================== */


.hero{


    min-height:420px;


    display:flex;

    flex-direction:column;


    justify-content:center;

    align-items:center;


    text-align:center;


    padding:40px 20px;


    background:


    radial-gradient(
        circle at top,
        #2563eb,
        #050816 70%
    );


}




.hero h1{


    font-size:60px;


    font-weight:800;


    animation:entrada 1s ease;


}




.hero p{


    margin-top:20px;


    max-width:700px;


    color:#cbd5e1;


    font-size:20px;


}





/* =====================================
        CATEGORIAS
===================================== */


.categoria{


    width:90%;


    max-width:1300px;


    margin:80px auto;


}





.categoria h2{


    color:#60a5fa;


    font-size:35px;


    margin-bottom:35px;


    position:relative;


}



.categoria h2::after{


    content:"";


    display:block;


    width:80px;


    height:4px;


    margin-top:10px;


    background:#2563eb;


    border-radius:10px;


}





/* =====================================
        GALERIA DE VIDEOS
===================================== */


.videos{


    display:grid;


    grid-template-columns:

    repeat(3,1fr);


    gap:30px;


}





.videos video{


    width:100%;


    height:360px;


    object-fit:cover;


    border-radius:25px;


    background:#000;


    padding:8px;


    border:

    1px solid rgba(96,165,250,.25);


    box-shadow:


    0 15px 40px rgba(0,0,0,.6);


    transition:.45s;


}





.videos video:hover{


    transform:


    translateY(-12px)
    scale(1.04);


    border-color:#2563eb;


    box-shadow:


    0 25px 60px rgba(37,99,235,.45);


}





/* =====================================
        FOOTER
===================================== */


footer{


    background:#020617;


    padding:35px;


    text-align:center;


    color:#94a3b8;


    margin-top:80px;


}





/* =====================================
        ANIMAÇÕES
===================================== */


@keyframes entrada{


    from{

        opacity:0;

        transform:translateY(50px);

    }


    to{

        opacity:1;

        transform:translateY(0);

    }

}





.categoria{


    animation:

    aparecer .8s ease;


}



@keyframes aparecer{


    from{

        opacity:0;

    }


    to{

        opacity:1;

    }


}







/* =====================================
        RESPONSIVO
===================================== */


@media(max-width:1000px){


header{


    height:auto;


    padding:20px;


    flex-direction:column;


    gap:20px;


}




nav ul{


    flex-wrap:wrap;


    justify-content:center;


}




.videos{


    grid-template-columns:

    repeat(2,1fr);


}



.hero h1{


    font-size:45px;


}



}





@media(max-width:650px){



nav ul{


    flex-direction:column;


    text-align:center;


}



.hero{


    min-height:350px;


}



.hero h1{


    font-size:32px;


}



.hero p{


    font-size:16px;


}



.videos{


    grid-template-columns:1fr;


}




.videos video{


    height:300px;


}



}

<script>

let lastScroll = 0;
const header = document.querySelector("header");


window.addEventListener("scroll",()=>{

    let currentScroll = window.pageYOffset;


    if(currentScroll > lastScroll && currentScroll > 100){

        // rolando para baixo
        header.classList.add("hide");

    }else{

        // rolando para cima
        header.classList.remove("hide");

    }


    lastScroll = currentScroll;

});


</script>
