<style>
/* ================================
        RESET
================================ */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    font-family:'Poppins',sans-serif;

    min-height:100vh;

    background:#050816;

    color:white;

    overflow-x:hidden;

}



/* ================================
        HEADER
================================ */


header{

    width:100%;

    padding:20px 7%;


    display:flex;

    align-items:center;

    justify-content:space-between;


    position:fixed;

    top:0;

    z-index:100;


    background:rgba(5,8,22,.55);

    backdrop-filter:blur(12px);


    transition:.4s;


}



.logo img{

    width:170px;


}





nav ul{

    display:flex;

    gap:30px;

    list-style:none;


}



nav a{

    color:white;

    text-decoration:none;

    font-weight:600;

    transition:.3s;

}



nav a:hover{


    color:#60a5fa;


}





.btn{


    background:#2563eb;


    padding:13px 30px;


    border-radius:40px;


    text-decoration:none;


    color:white;


    font-weight:700;


    transition:.3s;


}



.btn:hover{


    background:#1d4ed8;


    transform:translateY(-5px);


    box-shadow:

    0 10px 30px rgba(37,99,235,.5);


}






/* ================================
        VIDEO FUNDO
================================ */


.video-bg{


    position:relative;


    height:100vh;


    overflow:hidden;


}




.video-bg video{


    position:absolute;


    width:100%;


    height:100%;


    object-fit:cover;


}





.video-bg::after{


    content:"";


    position:absolute;


    inset:0;


    background:

    linear-gradient(

    rgba(0,0,0,.55),

    rgba(5,8,22,.9)

    );


}






/* ================================
        CONTEÚDO PRINCIPAL
================================ */


.conteudo{


    position:absolute;


    z-index:2;


    top:50%;


    left:50%;


    transform:translate(-50%,-50%);


    text-align:center;


    width:90%;


}



.conteudo h1{


    font-size:70px;


    font-weight:800;


    animation:entrada 1s;


}



.conteudo span{


    color:#60a5fa;


}



.conteudo p{


    max-width:700px;


    margin:25px auto;


    color:#cbd5e1;


    font-size:20px;


}





.botao{


    display:inline-block;


    margin-top:20px;


    padding:15px 40px;


    background:#2563eb;


    border-radius:40px;


    color:white;


    text-decoration:none;


    font-weight:700;


    transition:.3s;


}




.botao:hover{


    background:#1d4ed8;


    transform:scale(1.08);


}







/* ================================
        ANIMAÇÃO
================================ */


@keyframes entrada{


from{


opacity:0;


transform:translateY(50px);


}


to{


opacity:1;


transform:translateY(0);


}


}







/* ================================
        RESPONSIVO
================================ */


@media(max-width:900px){


header{


    flex-direction:column;


    gap:20px;


}



nav ul{


    flex-wrap:wrap;


    justify-content:center;


}



.conteudo h1{


    font-size:45px;


}


}




@media(max-width:600px){


nav ul{


    flex-direction:column;


    text-align:center;


}



.conteudo h1{


    font-size:35px;


}



.conteudo p{


    font-size:16px;


}



.logo img{


    width:140px;


}


}


</style>
